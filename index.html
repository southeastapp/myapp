        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;

        .status-loaded {
            background: #4CAF50;
        }
        
        .status-not-loaded {
            background: #f44336;
        }
        
        .stats {
            background: white;

            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 30px;

        .stat-number {
            font-size: 24px;

            border-radius: 15px;

</head>
<body>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalLinks">500</div>
                <div class="stat-label">Total Links</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="loadedLinks">0</div>
                <div class="stat-label">Loaded</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="sandboxEnabled">500</div>
                <div class="stat-label">Sandbox Active</div>
            </div>

                <div class="stat-number" id="githubLinks">0</div>

        </div>
        
        <div class="global-controls">
            <label>
                <input type="checkbox" id="globalSandbox" checked>
                Enable Sandbox Security (All Links)

            <label>
                <input type="checkbox" id="globalAllowScripts">
                Allow Scripts (Reduced Security)
            </label>
            <label>
                <input type="checkbox" id="globalAllowSameOrigin">
                Allow Same Origin
            </label>
            <button class="filter-btn" onclick="loadAll()">Load All</button>
            <button class="filter-btn" onclick="unloadAll()">Unload All</button>
            <button class="filter-btn" onclick="toggleAllSandbox()">Toggle All Sandbox</button>
        </div>
        
        <div class="controls">
            <input type="text" class="search-box" id="searchBox" placeholder="Cari URL atau nama..." onkeyup="filterLinks()">
            <button class="filter-btn active" onclick="filterCategory('all')">All</button>
            <button class="filter-btn" onclick="filterCategory('github')">GitHub</button>
            <button class="filter-btn" onclick="filterCategory('code')">Code Repos</button>
            <button class="filter-btn" onclick="filterCategory('docs')">Documentation</button>
            <button class="filter-btn" onclick="filterCategory('tools')">Tools</button>
            <button class="filter-btn" onclick="filterCategory('cdn')">CDN/Library</button>
        </div>
        
        <div class="grid" id="linkGrid"></div>
    </div>

    <script>
        // Daftar URL open source termasuk GitHub dan sub-domain
        const baseUrls = [
            // GitHub dan sub-domain
            { url: 'https://github.com', category: 'github', name: 'GitHub Main' },

            { url: 'https://regex101.com', category: 'tools', name: 'Regex101' },
            { url: 'https://caniuse.com', category: 'tools', name: 'Can I Use' },
            { url: 'https://npmjs.com', category: 'tools', name: 'npm' },
            
            // CDN & Libraries
            { url: 'https://cdnjs.com', category: 'cdn', name: 'cdnjs' },
            { url: 'https://unpkg.com', category: 'cdn', name: 'unpkg' },
            { url: 'https://jsdelivr.com', category: 'cdn', name: 'jsDelivr' },

            { url: 'https://bundlephobia.com', category: 'cdn', name: 'BundlePhobia' },

            { url: 'https://opensource.org', category: 'code', name: 'Open Source Initiative' },
            { url: 'https://apache.org', category: 'code', name: 'Apache Foundation' },
            { url: 'https://eclipse.org', category: 'code', name: 'Eclipse Foundation' },

            { url: 'https://medium.com', category: 'docs', name: 'Medium' },

            // Package Managers & Registries
            { url: 'https://pypi.org', category: 'cdn', name: 'PyPI' },
            { url: 'https://rubygems.org', category: 'cdn', name: 'RubyGems' },
            { url: 'https://packagist.org', category: 'cdn', name: 'Packagist' },

            { url: 'https://maven.org', category: 'cdn', name: 'Maven' },
            { url: 'https://gradle.org', category: 'cdn', name: 'Gradle' },
            
            // CI/CD & DevOps
            { url: 'https://travis-ci.com', category: 'tools', name: 'Travis CI' },
            { url: 'https://circleci.com', category: 'tools', name: 'CircleCI' },

            { url: 'https://railway.app', category: 'tools', name: 'Railway' },
            { url: 'https://fly.io', category: 'tools', name: 'Fly.io' },
            
            // Testing & Quality
            { url: 'https://sonarqube.org', category: 'tools', name: 'SonarQube' },
            { url: 'https://codecov.io', category: 'tools', name: 'Codecov' },
            { url: 'https://coveralls.io', category: 'tools', name: 'Coveralls' },
            { url: 'https://lighthouse-ci.com', category: 'tools', name: 'Lighthouse' },
            
            // Design & Assets
            { url: 'https://figma.com', category: 'tools', name: 'Figma' },
            { url: 'https://unsplash.com', category: 'cdn', name: 'Unsplash' },
            { url: 'https://pexels.com', category: 'cdn', name: 'Pexels' },
            { url: 'https://pixabay.com', category: 'cdn', name: 'Pixabay' },
            { url: 'https://fontawesome.com', category: 'cdn', name: 'Font Awesome' },
            { url: 'https://fonts.google.com', category: 'cdn', name: 'Google Fonts' },
            
            // APIs & Services
            { url: 'https://postman.com', category: 'tools', name: 'Postman' },
            { url: 'https://insomnia.rest', category: 'tools', name: 'Insomnia' },
            { url: 'https://httpie.io', category: 'tools', name: 'HTTPie' },
            { url: 'https://reqres.in', category: 'tools', name: 'ReqRes' },
            { url: 'https://jsonplaceholder.typicode.com', category: 'tools', name: 'JSON Placeholder' },
            
            // Monitoring & Analytics
            { url: 'https://sentry.io', category: 'tools', name: 'Sentry' },
            { url: 'https://newrelic.com', category: 'tools', name: 'New Relic' },
            { url: 'https://datadog.com', category: 'tools', name: 'Datadog' },
            { url: 'https://logrocket.com', category: 'tools', name: 'LogRocket' },
            
            // Communication
            { url: 'https://discord.com', category: 'tools', name: 'Discord' },
            { url: 'https://slack.com', category: 'tools', name: 'Slack' },
            { url: 'https://matrix.org', category: 'tools', name: 'Matrix' },
            { url: 'https://zulip.com', category: 'tools', name: 'Zulip' },
            
            // More GitHub related subdomains and variations
            { url: 'https://github.blog', category: 'github', name: 'GitHub Blog' },
            { url: 'https://resources.github.com', category: 'github', name: 'GitHub Resources' },
            { url: 'https://skills.github.com', category: 'github', name: 'GitHub Skills' },
            { url: 'https://cli.github.com', category: 'github', name: 'GitHub CLI' },
            { url: 'https://desktop.github.com', category: 'github', name: 'GitHub Desktop' },
            { url: 'https://mobile.github.com', category: 'github', name: 'GitHub Mobile' },
            { url: 'https://support.github.com', category: 'github', name: 'GitHub Support' },
            { url: 'https://community.github.com', category: 'github', name: 'GitHub Community' },
            { url: 'https://partner.github.com', category: 'github', name: 'GitHub Partners' },
            { url: 'https://enterprise.github.com', category: 'github', name: 'GitHub Enterprise' }
        ];

        // Generate 500 links dari base URLs
        const links = [];
        for (let i = 0; i < 500; i++) {
            const baseIndex = i % baseUrls.length;
            const variation = Math.floor(i / baseUrls.length);
            const baseUrl = baseUrls[baseIndex];
            
            let url = baseUrl.url;
            let name = baseUrl.name;
            
            // Add variation to URL if exists
            if (variation > 0) {
                if (baseUrl.url.includes('github.com')) {
                    url = `${baseUrl.url}/search?q=project${variation}`;
                    name = `${baseUrl.name} - Search ${variation}`;
                } else if (baseUrl.url.includes('gitlab.com')) {
                    url = `${baseUrl.url}/explore/projects/${variation}`;
                    name = `${baseUrl.name} - Project ${variation}`;
                } else {
                    url = `${baseUrl.url}?page=${variation + 1}`;
                    name = `${baseUrl.name} - Page ${variation + 1}`;
                }
            }
            
            links.push({
                id: i + 1,
                url: url,
                name: name,
                category: baseUrl.category,
                loaded: false,
                sandboxEnabled: true
            });
        }

        let currentFilter = 'all';

        function getSandboxAttributes(sandboxEnabled, allowScripts, allowSameOrigin) {
            if (!sandboxEnabled) return '';
            
            let attrs = 'allow-forms allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation';
            if (allowScripts) attrs += ' allow-scripts';
            if (allowSameOrigin) attrs += ' allow-same-origin';
            
            return attrs;
        }

        function createLinkCard(link) {
            const globalSandbox = document.getElementById('globalSandbox').checked;
            const allowScripts = document.getElementById('globalAllowScripts').checked;
            const allowSameOrigin = document.getElementById('globalAllowSameOrigin').checked;
            
            link.sandboxEnabled = globalSandbox;
            
            const sandboxAttrs = getSandboxAttributes(link.sandboxEnabled, allowScripts, allowSameOrigin);
            
            return `
                <div class="link-card" data-id="${link.id}" data-category="${link.category}" data-url="${link.url.toLowerCase()}">
                    <div class="card-header">
                        <span class="card-title">#${link.id} - ${link.name}</span>
                        <div class="sandbox-controls">
                            <button class="sandbox-btn btn-load" onclick="loadLink(${link.id})">Load</button>
                            <button class="sandbox-btn btn-new-tab" onclick="openNewTab(${link.id})">New Tab</button>
                            <button class="sandbox-btn btn-toggle-sandbox" onclick="toggleSandbox(${link.id})">${link.sandboxEnabled ? '🔒' : '🔓'}</button>
                        </div>
                    </div>
                    <iframe class="sandbox-frame" id="frame-${link.id}" src="" sandbox="${sandboxAttrs}" title="${link.name}"></iframe>
                    <div class="card-footer">
                        <div class="url-display">
                            <span class="status-indicator ${link.loaded ? 'status-loaded' : 'status-not-loaded'}"></span>
                            ${link.url}
                        </div>
                        <span class="category-tag">${link.category.toUpperCase()}</span>
                    </div>
                </div>
            `;
        }

        function renderLinks(filterLinksArray = links) {
            const grid = document.getElementById('linkGrid');
            grid.innerHTML = filterLinksArray.map(link => createLinkCard(link)).join('');
            updateStats();
        }

        function loadLink(id) {
            const link = links.find(l => l.id === id);
            if (link) {
                const frame = document.getElementById(`frame-${id}`);
                const globalSandbox = document.getElementById('globalSandbox').checked;
                const allowScripts = document.getElementById('globalAllowScripts').checked;
                const allowSameOrigin = document.getElementById('globalAllowSameOrigin').checked;
                
                const sandboxAttrs = getSandboxAttributes(link.sandboxEnabled, allowScripts, allowSameOrigin);
                frame.setAttribute('sandbox', sandboxAttrs);
                frame.src = link.url;
                link.loaded = true;
                
                updateCardStatus(id);
                updateStats();
            }
        }

        function unloadLink(id) {
            const link = links.find(l => l.id === id);
            if (link) {
                const frame = document.getElementById(`frame-${id}`);
                frame.src = '';
                link.loaded = false;
                updateCardStatus(id);
                updateStats();
            }
        }

        function openNewTab(id) {
            const link = links.find(l => l.id === id);
            if (link) {
                window.open(link.url, '_blank');
            }
        }

        function toggleSandbox(id) {
            const link = links.find(l => l.id === id);
            if (link) {
                link.sandboxEnabled = !link.sandboxEnabled;
                const frame = document.getElementById(`frame-${id}`);
                const allowScripts = document.getElementById('globalAllowScripts').checked;
                const allowSameOrigin = document.getElementById('globalAllowSameOrigin').checked;
                
                const sandboxAttrs = getSandboxAttributes(link.sandboxEnabled, allowScripts, allowSameOrigin);
                frame.setAttribute('sandbox', sandboxAttrs);
                
                renderLinks(getFilteredLinks());
            }
        }

        function updateCardStatus(id) {
            const card = document.querySelector(`[data-id="${id}"]`);
            if (card) {
                const indicator = card.querySelector('.status-indicator');
                const link = links.find(l => l.id === id);
                if (link) {
                    indicator.className = `status-indicator ${link.loaded ? 'status-loaded' : 'status-not-loaded'}`;
                }
            }
        }

        function loadAll() {
            links.forEach(link => {
                if (!link.loaded) {
                    loadLink(link.id);
                }
            });
        }

        function unloadAll() {
            links.forEach(link => {
                if (link.loaded) {
                    unloadLink(link.id);
                }
            });
        }

        function toggleAllSandbox() {
            const current = document.getElementById('globalSandbox').checked;
            document.getElementById('globalSandbox').checked = !current;
            renderLinks(getFilteredLinks());
        }

        function filterCategory(category) {
            currentFilter = category;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderLinks(getFilteredLinks());
        }

        function getFilteredLinks() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            
            return links.filter(link => {
                const matchesCategory = currentFilter === 'all' || link.category === currentFilter;
                const matchesSearch = searchTerm === '' || 
                                     link.name.toLowerCase().includes(searchTerm) || 
                                     link.url.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesSearch;
            });
        }

        function filterLinks() {
            renderLinks(getFilteredLinks());
        }

        function updateStats() {
            const loadedCount = links.filter(l => l.loaded).length;
            const sandboxCount = links.filter(l => l.sandboxEnabled).length;
            const githubCount = links.filter(l => l.category === 'github').length;
            
            document.getElementById('loadedLinks').textContent = loadedCount;
            document.getElementById('sandboxEnabled').textContent = sandboxCount;
            document.getElementById('githubLinks').textContent = githubCount;
        }

        // Event listeners for global controls
        document.getElementById('globalSandbox').addEventListener('change', () => {
            renderLinks(getFilteredLinks());
        });

        document.getElementById('globalAllowScripts').addEventListener('change', () => {
            renderLinks(getFilteredLinks());
        });

        document.getElementById('globalAllowSameOrigin').addEventListener('change', () => {
            renderLinks(getFilteredLinks());
        });

        // Initial render
        renderLinks();
    </script>
</body>
</html>
